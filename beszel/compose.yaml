x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    mem_limit: 700m
    cpus: "0.20"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      APP_URL: ${BESZEL_APP_URL:-https://beszel.perpixai.com}
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - beszel-data:/beszel_data
      - beszel-socket:/beszel_socket
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - perpix
    env_file:
      - /opt/perpix/.env

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    mem_limit: 250m
    cpus: "0.10"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    network_mode: host
    volumes:
      - beszel-agent-data:/var/lib/beszel-agent
      - beszel-socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://localhost:8090
      TOKEN: ${BESZEL_AGENT_TOKEN:-}
      KEY: ${BESZEL_AGENT_KEY:-}
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    env_file:
      - /opt/perpix/.env

volumes:
  beszel-data:
  beszel-socket:
  beszel-agent-data:

networks:
  perpix:
    external: true
