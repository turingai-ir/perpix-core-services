services:
  caddy:
    image: caddy:latest
    container_name: caddy
    mem_limit: 500m
    cpus: "0.20"
    restart: unless-stopped
    networks:
      - turing
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

networks:
  turing:
    external: true

volumes:
  caddy_data:
  caddy_config:
