services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5679:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      GENERIC_TIMEZONE: UTC
      N8N_HOST: n8n.perpixai.com
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://n8n.perpixai.com/
      WEBHOOK_URL: http://n8n.perpixai.com/
      N8N_DIAGNOSTICS_ENABLED: "false"
    restart: unless-stopped
    networks:
      - turing

volumes:
  n8n-data:

networks:
  turing:
    external: true
