services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5679:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      GENERIC_TIMEZONE: UTC
    restart: unless-stopped
    networks:
      - turing

volumes:
  n8n-data:

networks:
  turing:
    external: true
